name: Tests
permissions:
  contents: read
jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
        - python-version: '3.10'
          os: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        allow-prereleases: true
    - name: Install dependencies
      env:
        PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ matrix.python-version == '3.15-dev'
          && '1' || '' }}
      run: |
        make
    - name: Run tests
      run: |
        make ci
  no_chardet:
    name: No Character Detection
    runs-on: self-hosted
    strategy:
      fail-fast: true
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python 3.10
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        make
        python -m pip uninstall -y "charset_normalizer" "chardet"
    - name: Run tests
      run: |
        make ci
    timeout-minutes: 15
  urllib3:
    name: urllib3 1.x
    runs-on: self-hosted
    strategy:
      fail-fast: true
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        persist-credentials: false
    - name: Set up Python 3.10
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        make
        python  -m pip install "urllib3<2"
    - name: Run tests
      run: |
        make ci
    timeout-minutes: 15
env:
  PYTHONPATH: /tmp/instr
  BASH_ENV: /tmp/instr/bash_env.sh
'on':
- push
- pull_request
